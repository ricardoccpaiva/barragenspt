version: '3.2'
services:
  tileserver-gl:
    image: maptiler/tileserver-gl:v5.1.3
    restart: unless-stopped
    environment:
      - MBTILES_URL=${MBTILES_URL:-}
      - NODE_ENV=production
      - CACHE_SIZE=500m
    volumes:
      - .:/data
    ports:
      - "8090:8080"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        if [ -n "$$MBTILES_URL" ]; then
          f=$$(echo "$$MBTILES_URL" | sed 's/\?.*//;s/.*\///')
          if [ ! -f "/data/$$f" ]; then
            echo "Downloading MBTiles from $$MBTILES_URL..."
            node -e "
              const u=process.env.MBTILES_URL;
              const f=u.replace(/\?.*/,'').split('/').pop();
              const fs=require('fs');
              const p=u.startsWith('https')?require('https'):require('http');
              const fstream=fs.createWriteStream('/data/'+f);
              p.get(u,r=>{r.pipe(fstream);fstream.on('finish',()=>fstream.close());}).on('error',e=>{console.error(e);process.exit(1);});
            "
          fi
        fi
        exec /usr/src/app/docker-entrypoint.sh
